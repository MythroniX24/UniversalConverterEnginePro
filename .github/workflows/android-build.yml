name: Android CI — Build APK
on:
  push:
    branches: ["main","master","develop"]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - uses: android-actions/setup-android@v3
      - name: Install NDK and CMake
        run: |
          yes | sdkmanager "ndk;25.2.9519653" "cmake;3.22.1" --sdk_root="${ANDROID_SDK_ROOT}" 2>&1 | tail -3
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK=${ANDROID_SDK_ROOT}/ndk/25.2.9519653" >> $GITHUB_ENV
      - name: Download Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-
      - run: chmod +x gradlew
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          ANDROID_NDK: ${{ env.ANDROID_NDK_HOME }}
      - name: Build Release APK
        continue-on-error: true
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          ANDROID_NDK: ${{ env.ANDROID_NDK_HOME }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Release-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
