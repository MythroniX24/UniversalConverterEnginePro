name: Android CI — Build APK

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ──────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Android SDK ───────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. NDK + CMake ───────────────────────────────────────────────────────
      - name: Install NDK 25 and CMake
        run: |
          echo "y" | sdkmanager \
            "ndk;25.2.9519653" \
            "cmake;3.22.1" \
            --sdk_root="${ANDROID_SDK_ROOT}" 2>&1 | grep -E "^(Downloading|Installing|done)" || true
          NDK_PATH="${ANDROID_SDK_ROOT}/ndk/25.2.9519653"
          echo "ANDROID_NDK_HOME=${NDK_PATH}" >> $GITHUB_ENV
          echo "ANDROID_NDK=${NDK_PATH}"      >> $GITHUB_ENV
          echo "NDK installed at: ${NDK_PATH}"
          ls "${NDK_PATH}" | head -5

      # ── 5. Gradle Wrapper JAR ────────────────────────────────────────────────
      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          echo "Wrapper JAR: $(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes"

      # ── 6. Cache Gradle ──────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 7. Permissions ───────────────────────────────────────────────────────
      - name: Grant gradlew permission
        run: chmod +x gradlew

      # ── 8. Build Debug — FULL output for debugging ───────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --info 2>&1 | tail -200
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          ANDROID_NDK:      ${{ env.ANDROID_NDK_HOME }}

      # ── 9. Build Release ─────────────────────────────────────────────────────
      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace 2>&1 | tail -100
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          ANDROID_NDK:      ${{ env.ANDROID_NDK_HOME }}

      # ── 10. Upload artifacts ─────────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: UniversalConverterEnginePro-Debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: UniversalConverterEnginePro-Release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ── 11. APK details ───────────────────────────────────────────────────────
      - name: Show APK sizes
        run: find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;
