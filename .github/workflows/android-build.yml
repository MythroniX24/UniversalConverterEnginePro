name: Android CI — Build APK

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 25 and CMake
        run: |
          yes | sdkmanager \
            "ndk;25.2.9519653" \
            "cmake;3.22.1" \
            --sdk_root="${ANDROID_SDK_ROOT}" 2>&1 | grep -E "^(Downloading|Installing|done)" || true
          NDK_PATH="${ANDROID_SDK_ROOT}/ndk/25.2.9519653"
          echo "ANDROID_NDK_HOME=${NDK_PATH}" >> $GITHUB_ENV
          echo "ANDROID_NDK=${NDK_PATH}"      >> $GITHUB_ENV

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant gradlew permission
        run: chmod +x gradlew

      # ── Build Debug — save full log to file ──────────────────────────────────
      - name: Build Debug APK
        id: build_debug
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace > /tmp/build_debug.log 2>&1
          BUILD_EXIT=$?
          # Always show last 100 lines in Actions log
          echo "=== LAST 100 LINES ==="
          tail -100 /tmp/build_debug.log
          # Also show any line with error/exception
          echo ""
          echo "=== ERROR LINES ==="
          grep -iE "^(e:|error:|exception|caused by|> task|BUILD FAILED)" /tmp/build_debug.log || true
          exit $BUILD_EXIT
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          ANDROID_NDK:      ${{ env.ANDROID_NDK_HOME }}

      # ── Upload full build log on failure ────────────────────────────────────
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-error-log
          path: /tmp/build_debug.log
          retention-days: 7

      - name: Verify Debug APK exists
        run: ls -lh app/build/outputs/apk/debug/*.apk

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace > /tmp/build_release.log 2>&1
          BUILD_EXIT=$?
          tail -50 /tmp/build_release.log
          grep -iE "^(e:|error:|exception|caused by|BUILD FAILED)" /tmp/build_release.log || true
          exit $BUILD_EXIT
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          ANDROID_NDK:      ${{ env.ANDROID_NDK_HOME }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: UniversalConverterEnginePro-Debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: UniversalConverterEnginePro-Release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 30
