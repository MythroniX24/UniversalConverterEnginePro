name: Android CI — Build APK

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ─────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Android SDK + NDK via sdkmanager ────────────────────────────────
      - name: Set up Android SDK and NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 25.2.9519653
        run: |
          yes | sdkmanager --install \
            "ndk;25.2.9519653" \
            "cmake;3.22.1" \
            --sdk_root="${ANDROID_SDK_ROOT}" 2>&1 | tail -5
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK=${ANDROID_SDK_ROOT}/ndk/25.2.9519653"      >> $GITHUB_ENV

      # ── 4. Download Gradle Wrapper JAR ─────────────────────────────────────
      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -fL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          echo "JAR size: $(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes"

      # ── 5. Cache Gradle ────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 6. Permissions ─────────────────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 7. Build Debug ──────────────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          ANDROID_NDK:      ${{ env.ANDROID_NDK_HOME }}

      # ── 8. Build Release ────────────────────────────────────────────────────
      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          ANDROID_NDK:      ${{ env.ANDROID_NDK_HOME }}

      # ── 9. Upload Artifacts ─────────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: UniversalConverterEnginePro-Debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: UniversalConverterEnginePro-Release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ── 10. Print APK sizes ─────────────────────────────────────────────────
      - name: Show APK details
        run: |
          echo "=== Build Artifacts ==="
          find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;
