name: Android CI — Build APK

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 25 and CMake
        run: |
          yes | sdkmanager \
            "ndk;25.2.9519653" \
            "cmake;3.22.1" \
            --sdk_root="${ANDROID_SDK_ROOT}" 2>&1 | grep -E "^(Downloading|Installing|done)" || true
          NDK_PATH="${ANDROID_SDK_ROOT}/ndk/25.2.9519653"
          echo "ANDROID_NDK_HOME=${NDK_PATH}" >> $GITHUB_ENV
          echo "ANDROID_NDK=${NDK_PATH}"      >> $GITHUB_ENV
          echo "NDK ready: $(ls ${NDK_PATH} | head -3)"

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          echo "JAR: $(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant gradlew permission
        run: chmod +x gradlew

      # ── Build Debug APK ───────────────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          ANDROID_NDK:      ${{ env.ANDROID_NDK_HOME }}

      # ── Build Release APK ─────────────────────────────────────────────────────
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          ANDROID_NDK:      ${{ env.ANDROID_NDK_HOME }}

      # ── Upload Debug APK — always runs even if release fails ──────────────────
      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: UniversalConverterEnginePro-Debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 30

      # ── Upload Release APK ────────────────────────────────────────────────────
      - name: Upload Release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: UniversalConverterEnginePro-Release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 30

      # ── Summary ───────────────────────────────────────────────────────────────
      - name: Show build summary
        if: always()
        run: |
          echo "=== APKs Generated ==="
          find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \; 2>/dev/null \
            || echo "No APKs found"
